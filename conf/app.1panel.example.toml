## Service configuration (1Panel 生产环境定制版)
## 使用方法：复制此文件为 app.1panel.toml，然后修改密码等敏感字段
## cp conf/app.1panel.example.toml conf/app.1panel.toml

[log]
level = "info"
format = "text"

[server]
addr = "0.0.0.0:8080"

## Admin - 请修改默认密码！
[admin]
username = "admin"
password = "CHANGE_ME"
email = "admin@memoh.local"

## Auth configuration - 请生成随机 JWT Secret！
[auth]
jwt_secret = "CHANGE_ME_RANDOM_STRING_32_CHARS"
jwt_expires_in = "168h"

## Docker configuration
[containerd]
socket_path = "/run/containerd/containerd.sock"
namespace = "default"

[mcp]
# registry = "memoh.cn"  # Uncomment for China mainland mirror
image = "memohai/mcp:latest"
snapshotter = "overlayfs"
data_root = "/opt/memoh/data"

## Postgres configuration - 密码需与 docker-compose 中 POSTGRES_PASSWORD 一致
[postgres]
host = "postgres"
port = 5432
user = "memoh"
password = "CHANGE_ME"
database = "memoh"
sslmode = "disable"

## Qdrant configuration
[qdrant]
base_url = "http://qdrant:6334"
api_key = ""
timeout_seconds = 10

## Agent Gateway
[agent_gateway]
host = "agent"
port = 8081
server_addr = "server:8080"

## Browser Gateway
[browser_gateway]
host = "browser"
port = 8083
server_addr = "server:8080"

## Web
[web]
host = "0.0.0.0"
port = 8082
